version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: pesantren-nginx
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
    networks:
      - pesantren-net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pesantren-api
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-15m}
      - JWT_REFRESH_EXPIRATION=${JWT_REFRESH_EXPIRATION:-7d}
      - WA_PROVIDER=${WA_PROVIDER:-fonnte}
      - WA_API_KEY=${WA_API_KEY}
      - LICENSE_SERVER_URL=${LICENSE_SERVER_URL}
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pesantren-net
    volumes:
      - ./uploads:/app/uploads
      - ./backup:/app/backup

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pesantren-worker
    restart: always
    command: node dist/worker.js
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - WA_PROVIDER=${WA_PROVIDER:-fonnte}
      - WA_API_KEY=${WA_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pesantren-net

  postgres:
    image: postgres:14-alpine
    container_name: pesantren-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-pesantren}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-pesantren}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pesantren-net

  redis:
    image: redis:6-alpine
    container_name: pesantren-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass} --appendonly yes
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pesantren-net

volumes:
  pgdata:
  redisdata:

networks:
  pesantren-net:
    driver: bridge
